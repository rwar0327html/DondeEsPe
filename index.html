<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiestas en Tiempo Real</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:black; color:white; }
    header { 
      text-align:center; 
      padding:40px; 
      background: linear-gradient(45deg, #ff00ff, #00ffff); 
      color:white; 
    }
    #map { height: 90vh; width: 100%; }
    button { 
      padding:10px 20px; 
      border:none; 
      background:#00ffff; 
      color:#000; 
      border-radius:8px; 
      cursor:pointer;
      font-weight:bold;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal {
      background: #0b0b0f;
      border-radius: 16px;
      padding: 24px 20px;
      width: 95%;
      max-width: 420px;
      border: 1px solid #ff00ff;
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
      position: relative;
    }

    .modal h2 { margin-top: 0; margin-bottom: 4px; font-size: 1.4rem; }
    .modal-subtitle { margin-top: 0; margin-bottom: 16px; font-size: 0.9rem; color: #ccc; }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .modal label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 0.85rem; color: #ddd; }

    .modal input,
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #141419;
      color: #fff;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    .modal textarea { resize: vertical; min-height: 60px; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row span { font-size: 0.9rem; }

    .file-input {
      border: 1px dashed #555;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 4px;
    }

    .modal-actions { margin-top: 16px; display: flex; justify-content: flex-end; gap: 10px; }

    .btn-secondary { background: #222; color: #fff; }
    .btn-primary { background: #00ffff; color: #000; }

    .btn-secondary,
    .btn-primary {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .helper-text { font-size: 0.75rem; color: #888; margin-top: 3px; }
  </style>
</head>

<body>

  <header>
    <h1>Fiestas en Tiempo Real</h1>
    <p>¡Descubre y crea fiestas donde quieras!</p>

    <button onclick="window.scrollTo({top: document.getElementById('map-section').offsetTop, behavior:'smooth'})">
      Mantente Atento
    </button>

    <div id="estado-firebase" style="margin-top:20px; font-weight:bold;">
      Verificando conexión con Firebase...
    </div>
  </header>

  <section id="map-section" style="height:90vh; width:100%;">
    <div id="map"></div>
  </section>

  <div id="fiesta-modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" type="button" onclick="cerrarModalFiesta()">✕</button>
      <h2>Crear Fiesta 🎉</h2>
      <p class="modal-subtitle">Ubicación seleccionada en el mapa ✔</p>

      <form id="fiesta-form" onsubmit="guardarFiesta(event)">
        <label for="fiesta-nombre">Nombre de la fiesta</label>
        <input id="fiesta-nombre" type="text" required maxlength="80" />

        <label for="fiesta-descripcion">Descripción</label>
        <textarea id="fiesta-descripcion" required maxlength="300"></textarea>

        <label for="fiesta-fecha">Fecha</label>
        <input id="fiesta-fecha" type="date" required />

        <label for="fiesta-zona">Zona / Distrito</label>
        <select id="fiesta-zona" required>
          <option value="">Selecciona una zona</option>
          <option>Miraflores</option>
          <option>Barranco</option>
          <option>Surco</option>
          <option>San Isidro</option>
          <option>Centro de Lima</option>
          <option>Otro</option>
        </select>

        <label for="fiesta-capacidad">Capacidad mínima</label>
        <div class="slider-row">
          <input id="fiesta-capacidad" type="range" min="10" max="300" value="50"
            oninput="document.getElementById('capacidad-valor').textContent = this.value + ' personas';" />
          <span id="capacidad-valor">50 personas</span>
        </div>

        <label for="fiesta-flyer">Flyer</label>
        <div class="file-input">
          <input id="fiesta-flyer" type="file" accept="image/*" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="cerrarModalFiesta()">Cancelar</button>
          <button type="submit" class="btn-primary">Publicar fiesta</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB-q52-p_bZj6KeFCVvSRaNoEDcW1GdY-w",
      authDomain: "dondeespe-e3c51.firebaseapp.com",
      databaseURL: "https://dondeespe-e3c51-default-rtdb.firebaseio.com",
      projectId: "dondeespe-e3c51",
      storageBucket: "dondeespe-e3c51.firebasestorage.app",
      messagingSenderId: "383024573594",
      appId: "1:383024573594:web:522d399280589261418323",
      measurementId: "G-NX47X8PK1Q"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCgFLYXdggm6O2zpNnYCzGvZFm8WKnExVE&callback=initMap" async defer></script>

  <!-- Lógica del mapa y modal -->
  <script>
    let map;
    let selectedLatLng = null;

    function abrirModalFiesta() {
      document.getElementById("fiesta-modal-overlay").style.display = "flex";
    }

    function cerrarModalFiesta() {
      document.getElementById("fiesta-modal-overlay").style.display = "none";
      selectedLatLng = null;
      document.getElementById("fiesta-form").reset();
      document.getElementById("capacidad-valor").textContent = "50 personas";
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -12.0464, lng: -77.0428 },
        zoom: 12,
      });

      map.addListener("click", (e) => {
        selectedLatLng = e.latLng;
        abrirModalFiesta();
      });
    }
  </script>

  <!-- 🔥 SCRIPT DE PRUEBA PARA guardarFiesta -->
  <script>
    console.log("Cargando función guardarFiesta...");

    window.guardarFiesta = function(event) {
      event.preventDefault();
      alert("✔ La función guardarFiesta SÍ se ejecuta correctamente.");
    };
  </script>

  <!-- app.js -->
  <script src="app.js"></script>

</body>
</html>
