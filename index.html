<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiestas en Tiempo Real</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:black; color:white; }
    header { 
      text-align:center; 
      padding:40px; 
      background: linear-gradient(45deg, #ff00ff, #00ffff); 
      color:white; 
    }
    #map { height: 90vh; width: 100%; }
    button { 
      padding:10px 20px; 
      border:none; 
      background:#00ffff; 
      color:#000; 
      border-radius:8px; 
      cursor:pointer;
      font-weight:bold;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;           
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal {
      background: #0b0b0f;
      border-radius: 16px;
      padding: 24px 20px;
      width: 95%;
      max-width: 420px;
      border: 1px solid #ff00ff;
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
      position: relative;
    }

    .modal h2 { margin: 0 0 4px; font-size: 1.4rem; }
    .modal-subtitle { margin: 0 0 16px; font-size: 0.9rem; color: #ccc; }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .modal label { display:block; margin-top:10px; margin-bottom:4px; font-size:0.85rem; color:#ddd; }
    .modal input,.modal textarea,.modal select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #141419;
      color: #fff;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    .slider-row { display:flex; align-items:center; gap:10px; }
    .file-input { border: 1px dashed #555; border-radius: 10px; padding: 10px; text-align:center; margin-top:4px; }

    .modal-actions { margin-top:16px; display:flex; justify-content:flex-end; gap:10px; }
    .btn-secondary { background:#222; color:#fff; }
    .btn-primary { background:#00ffff; color:#000; }
    .btn-secondary,.btn-primary { padding:8px 16px; border-radius:999px; border:none; cursor:pointer; font-weight:bold; }

  </style>
</head>

<body>

  <!-- PORTADA -->
  <header>
    <h1>Fiestas en Tiempo Real</h1>
    <p>¡Descubre y crea fiestas donde quieras!</p>

    <button onclick="window.scrollTo({top: document.getElementById('map-section').offsetTop, behavior:'smooth'})">
      Mantente Atento
    </button>

    <div id="estado-firebase" style="margin-top:20px; font-weight:bold;">
      Verificando conexión con Firebase...
    </div>
  </header>

  <!-- MAPA -->
  <section id="map-section" style="height:90vh; width:100%;">
    <div id="map"></div>
  </section>

  <!-- MODAL -->
  <div id="fiesta-modal-overlay" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" type="button" onclick="cerrarModalFiesta()">✕</button>
      <h2>Crear Fiesta 🎉</h2>
      <p class="modal-subtitle">Ubicación seleccionada en el mapa ✔</p>

      <form id="fiesta-form" onsubmit="guardarFiesta(event)">
        <label>Nombre de la fiesta</label>
        <input id="fiesta-nombre" type="text" required maxlength="80" />

        <label>Descripción</label>
        <textarea id="fiesta-descripcion" required maxlength="300"></textarea>

        <label>Fecha</label>
        <input id="fiesta-fecha" type="date" required />

        <label>Zona</label>
        <select id="fiesta-zona" required>
          <option value="">Selecciona una zona</option>
          <option value="Miraflores">Miraflores</option>
          <option value="Barranco">Barranco</option>
          <option value="Surco">Surco</option>
          <option value="San Isidro">San Isidro</option>
          <option value="Centro de Lima">Centro de Lima</option>
        </select>

        <label>Capacidad mínima</label>
        <div class="slider-row">
          <input id="fiesta-capacidad" type="range" min="10" max="300" value="50"
            oninput="document.getElementById('capacidad-valor').textContent = this.value + ' personas';" />
          <span id="capacidad-valor">50 personas</span>
        </div>

        <label>Flyer</label>
        <div class="file-input">
          <input id="fiesta-flyer" type="file" accept="image/*" />
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="cerrarModalFiesta()">Cancelar</button>
          <button type="submit" class="btn-primary">Publicar fiesta</button>
        </div>

      </form>
    </div>
  </div>

  <!-- Firebase -->
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const estado = document.getElementById("estado-firebase");
      if (estado) estado.textContent = "Firebase conectado correctamente.";
    });

    const firebaseConfig = {
      apiKey: "AIzaSyB-q52-p_bZj6KeFCVvSRaNoEDcW1GdY-w",
      authDomain: "dondeespe-e3c51.firebaseapp.com",
      databaseURL: "https://dondeespe-e3c51-default-rtdb.firebaseio.com",
      projectId: "dondeespe-e3c51",
      storageBucket: "dondeespe-e3c51.firebasestorage.app",
      messagingSenderId: "383024573594",
      appId: "1:383024573594:web:522d399280589261418323",
      measurementId: "G-NX47X8PK1Q"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <!-- Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCgFLYXdggm6O2zpNnYCzGvZFm8WKnExVE&callback=initMap" async defer></script>

  <!-- Lógica -->
  <script>
    let map;
    let selectedLatLng = null;

    function abrirModalFiesta() {
      document.getElementById("fiesta-modal-overlay").style.display = "flex";
    }

    function cerrarModalFiesta() {
      document.getElementById("fiesta-modal-overlay").style.display = "none";
      selectedLatLng = null;
      document.getElementById("fiesta-form").reset();
      document.getElementById("capacidad-valor").textContent = "50 personas";
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -12.0464, lng: -77.0428 },
        zoom: 12,
      });

      map.addListener("click", (e) => {
        selectedLatLng = e.latLng;
        abrirModalFiesta();
      });

      db.ref("fiestas").on("value", (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        Object.values(data).forEach(evento => {
          if (!evento.lat || !evento.lng) return;

          const marker = new google.maps.Marker({
            position: { lat: evento.lat, lng: evento.lng },
            map: map,
            title: evento.nombre || "Fiesta"
          });

          marker.addEventListener("click", () => {
            alert(
              `Fiesta: ${evento.nombre}\nFecha: ${evento.fecha}\nZona: ${evento.zona}\nCapacidad: ${evento.capacidadMinima}\nDescripción: ${evento.descripcion}`
            );
          });
        });
      });
    }

    /* 🔥 FUNCIÓN GLOBAL PARA QUE funcione el botón */
    window.guardarFiesta = function(e) {
      e.preventDefault();

      if (!selectedLatLng) {
        alert("Selecciona ubicación en el mapa.");
        return;
      }

      const nombre = document.getElementById("fiesta-nombre").value.trim();
      const descripcion = document.getElementById("fiesta-descripcion").value.trim();
      const fecha = document.getElementById("fiesta-fecha").value;
      const zona = document.getElementById("fiesta-zona").value;
      const capacidad = parseInt(document.getElementById("fiesta-capacidad").value);

      db.ref("fiestas").push({
        nombre,
        descripcion,
        fecha,
        zona,
        capacidadMinima: capacidad,
        lat: selectedLatLng.lat(),
        lng: selectedLatLng.lng(),
        flyerURL: "",
        estado: "pendiente",
        creadoEn: Date.now()
      });

      cerrarModalFiesta();
      alert("Fiesta creada y guardada.");
    };
  </script>

</body>
</html>
