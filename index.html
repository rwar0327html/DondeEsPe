<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiestas en Tiempo Real</title>

  <!-- Aquí van los estilos CSS si los tienes -->
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    header { text-align:center; padding:20px; background:#ff4081; color:white; }
    #map { height: 90vh; width: 100%; }
    button { padding:10px 20px; border:none; background:white; color:#ff4081; border-radius:5px; cursor:pointer; }
  </style>
</head>
<body>

  <!-- 1️⃣ Portada principal -->
  <header>
    <h1>Fiestas en Tiempo Real</h1>
    <p>¡Descubre y crea fiestas donde quieras!</p>
    <button onclick="document.getElementById('map-section').scrollIntoView({behavior:'smooth'})">
      Mantente Atento
    </button>
  </header>

  <!-- 2️⃣ Sección del mapa -->
  <section id="map-section">
    <div id="map"></div>
  </section>

  <!-- 3️⃣ Scripts: Google Maps API y JavaScript -->
  <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY"></script>
  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -12.0464, lng: -77.0428 }, // Lima de ejemplo
        zoom: 12,
      });

      map.addListener("click", (e) => {
        crearEvento(e.latLng);
      });
    }

    function crearEvento(latLng) {
      const nombre = prompt("Nombre de la fiesta:");
      if (!nombre) return;

      const fecha = prompt("Fecha de la fiesta (dd/mm/yyyy):");
      if (!fecha) return;

      const descripcion = prompt("Descripción de la fiesta:");
      if (!descripcion) return;

      new google.maps.Marker({
        position: latLng,
        map: map,
        title: nombre
      }).addListener("click", () => {
        alert(`Fiesta: ${nombre}\nFecha: ${fecha}\nDescripción: ${descripcion}`);
      });
    }

    window.onload = initMap;
  </script>

</body>
</html>
