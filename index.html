<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiestas en Tiempo Real</title>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:black; color:white; }
    header { 
      text-align:center; 
      padding:40px; 
      background: linear-gradient(45deg, #ff00ff, #00ffff); 
      color:white; 
    }
    #map { height: 90vh; width: 100%; }
    button { 
      padding:10px 20px; 
      border:none; 
      background:#00ffff; 
      color:#000; 
      border-radius:8px; 
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <!-- PORTADA -->
  <header>
    <h1>Fiestas en Tiempo Real</h1>
    <p>¡Descubre y crea fiestas donde quieras!</p>

    <button onclick="window.scrollTo({top: document.getElementById('map-section').offsetTop, behavior:'smooth'})">
      Mantente Atento
    </button>
  </header>

  <!-- MAPA -->
  <section id="map-section" style="height:90vh; width:100%;">
    <div id="map"></div>
  </section>

  <!-- GOOGLE MAPS -->
 <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCgFLYXdggm6O2zpNnYCzGvZFm8WKnExVE&callback=initMap" async defer></script>

  <script>
    let map;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -12.0464, lng: -77.0428 },
        zoom: 12,
      });

      map.addListener("click", (e) => {
        crearEvento(e.latLng);
      });
    }

    function crearEvento(latLng) {
      const nombre = prompt("Nombre de la fiesta:");
      if (!nombre) return;

      const fecha = prompt("Fecha de la fiesta (dd/mm/yyyy):");
      if (!fecha) return;

      const descripcion = prompt("Descripción de la fiesta:");
      if (!descripcion) return;

      new google.maps.Marker({
        position: latLng,
        map: map,
        title: nombre
      }).addListener("click", () => {
        alert(`Fiesta: ${nombre}\nFecha: ${fecha}\nDescripción: ${descripcion}`);
      });
    }
  </script>

</body>
</html>
